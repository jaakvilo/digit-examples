<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polygon Row Patterns</title>
  <style>
    :root {
      --bg: #fff7ea;
      --ink: #1f2937;
      --muted: #5f6673;
      --line: #e4d8c6;
      --accent: #b8432f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Source Sans 3", system-ui, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--ink);
      padding: 24px;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    code {
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 2px 5px;
    }
  </style>
</head>
<body>
  <main>
    <a href="../">Back to examples</a>
    <h1>Polygon Row Patterns</h1>
    <p>Run <code>python3 ./shapes_first_program.py</code> to regenerate the image.</p>
    <img src="shapes_first_program.png" alt="Rows of colored polygons from triangles to many-sided shapes" />
  </main>
</body>
</html>
